name: RAG Eval Gate

on:
  pull_request:
    branches: [main]

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RAGAS evaluation
        run: python scripts/run_eval.py --threshold faithfulness=0.85
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Assert metrics meet SLO
        run: |
          python -c "
          import json
          with open('reports/ragas_report.json') as f:
              r = json.load(f)
          agg = r.get('aggregate', r)
          slo = {
              'faithfulness': 0.85,
              'answer_relevancy': 0.80,
              'context_precision': 0.70,
              'context_recall': 0.75,
          }
          for metric, threshold in slo.items():
              score = agg.get(metric, 0)
              assert score >= threshold, f'FAIL: {metric}={score:.4f} < {threshold}'
              print(f'PASS: {metric}: {score:.4f} >= {threshold}')
          print('All metrics meet SLO ✓')
          "

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: ragas-report
          path: |
            reports/ragas_report.json
            reports/cluster_analysis.json
            phase-a/ragas_results.csv
